<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter</title>
</head>
<body>
  
  <div class="container">

    <h2>Temperature Converter</h2>

    <input
    type="number"
    id="temp"
    placeholder="Enter Temperature">

    <button onclick="toFahrenheit()">
        Celsius ➜ Fahrenheit
    </button>

    <button onclick="toCelsius()">
        Fahrenheit ➜ Celsius
    </button>

    <p id="result"></p>

</div>
  
</body>
</html>
