<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <h1>Vowel or Consonant Checker</h1>

        <input type="text" id="char" class="input-box"
        placeholder="Enter a Character" maxlength="1">

        <button class="btn" onclick="checkVowel()">
            Check Character
        </button>

        <div id="result" class="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
